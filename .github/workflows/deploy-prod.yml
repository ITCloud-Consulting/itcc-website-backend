name: Deploy PHP App to Production

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Configuration SSH
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Test de la connexion SSH
      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo 'SSH connection successful'"

      # Préparation du répertoire sur le serveur
      - name: Prepare deployment directory
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            mkdir -p /var/www/prod/itcc-website-backend
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /var/www/prod/itcc-website-backend
          "

      # Synchronisation des fichiers
      - name: Sync files to server
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='vendor' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/prod/itcc-website-backend/

      # Déploiement avec Docker
      - name: Deploy with Docker
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /var/www/prod/itcc-website-backend

            # Créer ou écraser le fichier .env avec toutes les variables
            echo "APP_NAME=Laravel" > .env
            echo "APP_ENV=production" >> .env
            echo "APP_KEY=${{ secrets.ITCC_API_APP_KEY }}" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_URL=${{ secrets.ITCC_API_APP_URL }}" >> .env
            echo "APP_LOCALE=en" >> .env
            echo "APP_FALLBACK_LOCALE=en" >> .env
            echo "APP_FAKER_LOCALE=en_US" >> .env
            echo "APP_MAINTENANCE_DRIVER=file" >> .env
            echo "PHP_CLI_SERVER_WORKERS=4" >> .env
            echo "BCRYPT_ROUNDS=12" >> .env
            echo "LOG_CHANNEL=stack" >> .env
            echo "LOG_STACK=single" >> .env
            echo "LOG_DEPRECATIONS_CHANNEL=null" >> .env
            echo "LOG_LEVEL=debug" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=${{ secrets.ITCC_API_DB_HOST }}" >> .env
            echo "DB_PORT=${{ secrets.ITCC_API_DB_PORT }}" >> .env
            echo "DB_DATABASE=${{ secrets.ITCC_API_DB_DATABASE }}" >> .env
            echo "DB_USERNAME=${{ secrets.ITCC_API_DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.ITCC_API_DB_PASSWORD }}" >> .env
            echo "SESSION_DRIVER=database" >> .env
            echo "SESSION_LIFETIME=120" >> .env
            echo "SESSION_ENCRYPT=false" >> .env
            echo "SESSION_PATH=/" >> .env
            echo "SESSION_DOMAIN=null" >> .env
            echo "BROADCAST_CONNECTION=log" >> .env
            echo "FILESYSTEM_DISK=local" >> .env
            echo "QUEUE_CONNECTION=database" >> .env
            echo "CACHE_STORE=database" >> .env
            echo "MEMCACHED_HOST=127.0.0.1" >> .env
            echo "REDIS_CLIENT=phpredis" >> .env
            echo "REDIS_HOST=${{ secrets.ITCC_API_REDIS_HOST }}" >> .env
            echo "REDIS_PASSWORD=${{ secrets.ITCC_API_REDIS_PASSWORD }}" >> .env
            echo "REDIS_PORT=${{ secrets.ITCC_API_REDIS_PORT }}" >> .env
            echo "MAIL_MAILER=smtp" >> .env
            echo "MAIL_HOST=${{ secrets.ITCC_API_MAIL_HOST }}" >> .env
            echo "MAIL_PORT=${{ secrets.ITCC_API_MAIL_PORT }}" >> .env
            echo "MAIL_USERNAME=${{ secrets.ITCC_API_MAIL_USERNAME }}" >> .env
            echo "MAIL_PASSWORD=${{ secrets.ITCC_API_MAIL_PASSWORD }}" >> .env
            echo "MAIL_ENCRYPTION=${{ secrets.ITCC_API_MAIL_ENCRYPTION }}" >> .env
            echo "MAIL_FROM_ADDRESS=${{ secrets.ITCC_API_MAIL_FROM_ADDRESS }}" >> .env
            echo "MAIL_FROM_NAME='${{ secrets.ITCC_API_MAIL_FROM_NAME }}'" >> .env
            echo "ADMIN_EMAIL=${{ secrets.ITCC_API_ADMIN_EMAIL }}" >> .env
            echo "AWS_ACCESS_KEY_ID=" >> .env
            echo "AWS_SECRET_ACCESS_KEY=" >> .env
            echo "AWS_DEFAULT_REGION=" >> .env
            echo "AWS_BUCKET=" >> .env
            echo "AWS_USE_PATH_STYLE_ENDPOINT=" >> .env
            echo "VITE_APP_NAME=\"\${APP_NAME}\"" >> .env

            # Docker build et migrations
            docker-compose down || true
            docker system prune -f || true
            docker-compose up -d --build
            sleep 30

            docker-compose exec -T app php artisan key:generate --force || true
            docker-compose exec -T app php artisan config:cache
            docker-compose exec -T app php artisan route:cache
            docker-compose exec -T app php artisan view:cache
            docker-compose exec -T app php artisan migrate --force

            docker-compose exec -T app composer install --no-dev --optimize-autoloader
            docker-compose exec -T app composer dump-autoload --optimize

            docker-compose exec -T app chown -R www:www /var/www/storage
            docker-compose exec -T app chown -R www:www /var/www/bootstrap/cache
            docker-compose exec -T app chmod -R 775 /var/www/storage
            docker-compose exec -T app chmod -R 775 /var/www/bootstrap/cache

            echo 'Deployment completed successfully!'
          "
